<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidates — Contoso HR Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .page { padding: 24px; max-width: 1200px; margin: 0 auto; }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .stat-card {
      flex: 1;
      min-width: 140px;
      padding: 16px 20px;
    }
    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
      color: var(--contoso-blue);
      line-height: 1;
    }
    .stat-card .label {
      font-size: 12px;
      color: var(--contoso-gray-dark);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-card.advance .value { color: var(--contoso-green); }
    .stat-card.hold .value    { color: #7A5C00; }
    .stat-card.reject .value  { color: var(--contoso-red); }

    /* Filter bar */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      align-items: center;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: white;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn.active { background: var(--contoso-blue); color: white; border-color: var(--contoso-blue); }
    .filter-btn:hover:not(.active) { background: var(--contoso-gray); }

    .refresh-info {
      margin-left: auto;
      font-size: 12px;
      color: var(--contoso-gray-dark);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Grid */
    .candidates-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .candidate-card {
      padding: 18px;
      cursor: pointer;
      transition: all 0.15s;
      border: 2px solid transparent;
    }
    .candidate-card:hover {
      border-color: var(--contoso-blue);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,120,212,0.15);
    }
    .candidate-card .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .candidate-name { font-weight: 600; font-size: 15px; }
    .candidate-file { font-size: 11px; color: var(--contoso-gray-dark); margin-top: 2px; }
    .candidate-scores { margin: 12px 0; }
    .score-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
    .score-label { width: 80px; color: var(--contoso-gray-dark); }
    .score-num { font-weight: 600; width: 30px; }
    .candidate-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
    .candidate-time { font-size: 11px; color: var(--contoso-gray-dark); }

    /* Detail modal extras */
    .detail-section { margin-bottom: 20px; }
    .detail-section:last-child { margin-bottom: 0; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
    .detail-metric { background: var(--contoso-gray); padding: 10px 14px; border-radius: var(--radius); }
    .detail-metric .dm-value { font-size: 22px; font-weight: 700; color: var(--contoso-blue); }
    .detail-metric .dm-label { font-size: 11px; color: var(--contoso-gray-dark); }
    .decision-banner {
      padding: 12px 16px;
      border-radius: var(--radius);
      margin-bottom: 16px;
      font-weight: 600;
      font-size: 15px;
    }
    .decision-banner.advance { background: #DFF6DD; color: var(--contoso-green); }
    .decision-banner.hold    { background: #FFF4CE; color: #7A5C00; }
    .decision-banner.reject  { background: #FDE7E9; color: var(--contoso-red); }

    .list-items { list-style: none; }
    .list-items li { padding: 4px 0; padding-left: 16px; position: relative; font-size: 13px; }
    .list-items li::before { content: '•'; position: absolute; left: 0; color: var(--contoso-blue); }
    .list-items li.red::before { color: var(--contoso-red); }

    .reasoning-box {
      background: var(--contoso-blue-light);
      border-left: 3px solid var(--contoso-blue);
      padding: 10px 14px;
      border-radius: 0 var(--radius) var(--radius) 0;
      font-size: 13px;
      line-height: 1.6;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-logo">Contoso</div>
    <div class="header-sub">HR Agent</div>
    <nav class="header-nav">
      <a href="chat.html">← Back to Chat</a>
      <a href="candidates.html" class="active">Candidates</a>
    </nav>
  </header>

  <div class="page">
    <!-- Stats Bar -->
    <div class="stats-bar" id="stats-bar">
      <div class="card stat-card"><div class="value" id="stat-total">–</div><div class="label">Total Evaluated</div></div>
      <div class="card stat-card advance"><div class="value" id="stat-advance">–</div><div class="label">Advance</div></div>
      <div class="card stat-card hold"><div class="value" id="stat-hold">–</div><div class="label">Hold</div></div>
      <div class="card stat-card reject"><div class="value" id="stat-reject">–</div><div class="label">Reject</div></div>
      <div class="card stat-card"><div class="value" id="stat-score">–</div><div class="label">Avg Score</div></div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" data-filter="advance" onclick="setFilter('advance', this)">Advance</button>
      <button class="filter-btn" data-filter="hold" onclick="setFilter('hold', this)">Hold</button>
      <button class="filter-btn" data-filter="reject" onclick="setFilter('reject', this)">Reject</button>
      <div class="refresh-info">
        <div class="spinner" id="refresh-spinner" style="display:none"></div>
        <span id="refresh-label">Auto-refreshes every 10s</span>
      </div>
    </div>

    <!-- Grid -->
    <div class="candidates-grid" id="candidates-grid">
      <div class="empty-state" style="grid-column:1/-1">
        <div class="icon">⏳</div>
        <p>Loading candidates...</p>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-backdrop" id="modal-backdrop" style="display:none" onclick="closeModal(event)">
    <div class="modal" id="detail-modal">
      <div class="modal-header">
        <div>
          <div id="modal-name" style="font-weight:700;font-size:17px"></div>
          <div id="modal-file" style="font-size:12px;color:var(--contoso-gray-dark);margin-top:2px"></div>
        </div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body" id="modal-body">
        <!-- Populated by JS -->
      </div>
      <div class="modal-footer">
        <a href="chat.html" class="btn btn-ghost">Ask HR Assistant</a>
      </div>
    </div>
  </div>

  <script src="candidates.js"></script>
</body>
</html>
